services:
  - type: web
    name: spendsense-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_TOKEN
        generateValue: true
      - key: ALERTS_ENABLED
        value: "true"
      - key: FRONTEND_URL
        sync: false
