services:
  - type: web
    name: spendsense-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spendsense-db
          property: connectionString
      - key: SECRET_TOKEN
        generateValue: true
      - key: ALERTS_ENABLED
        value: "true"
      - key: FRONTEND_URL
        sync: false

databases:
  - name: spendsense-db
    plan: free
